worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 启用 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm;
    gzip_min_length 1000;
    gzip_comp_level 6;

    server {
        listen       80;
        server_name  localhost;

        # 项目根目录（指向 dist）
        root   E:/Code/claude/react/ZhouAnime/dist;
        index  index.html;

        # 静态资源缓存策略
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # WASM 文件 MIME 类型
        location ~* \.wasm$ {
            types { application/wasm wasm; }
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA 路由兜底
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
