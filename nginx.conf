worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 启用 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm;
    gzip_min_length 1000;
    gzip_comp_level 6;

    server {
        listen       80;
        server_name  localhost;

        # 项目根目录（指向 dist）
        root   E:/Code/claude/react/ZhouAnime/dist;
        index  index.html;

        # API 反向代理到后端 8080 端口
        location /api/ {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS 头（兼容后端未处理的情况）
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            # OPTIONS 预检请求直接返回 204
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 静态资源缓存策略
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # WASM 文件 MIME 类型
        location ~* \.wasm$ {
            types { application/wasm wasm; }
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA 路由兜底
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
